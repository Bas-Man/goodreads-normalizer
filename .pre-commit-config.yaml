repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace # Trims trailing whitespace
      - id: end-of-file-fixer # Ensures files end with a newline
      - id: check-yaml # Checks YAML syntax
      - id: check-added-large-files # Prevents committing massive files
      - id: check-ast # Validates Python abstract syntax trees

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.29
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff # Lints Python code (replaces Flake8, Autoflake)
        args: [--fix] # Automatically fix fixable lint errors
      - id: ruff-format # Formats Python code (replaces Black)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.2.0
    hooks:
      - id: mypy # Validates static type hints
        args: [--python-executable=.venv/bin/python]
        additional_dependencies: [types-requests] # Add types for your external libs if needed
