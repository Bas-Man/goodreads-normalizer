[project]
name = "goodreads-exporter"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [{ name = "Adam.S", email = "Bas-Man@users.noreply.github.com" }]
requires-python = ">=3.14"
dependencies = [
  "httpx>=0.28.1",
  "isbnlib>=3.10.14",
  "pandas>=3.0.3",
  "pydantic>=2.13.4",
  "python-slugify>=8.0.4",
  "pyyaml>=6.0.3",
  "rapidfuzz>=3.14.5",
  "rich>=15.0.0",
  "ruamel-yaml>=0.19.1",
  "typer>=0.25.1",
]

[project.scripts]
goodreads-exporter = "goodreads_exporter.cli.main:app"

[build-system]
requires = ["uv_build>=0.11.14,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = ["mypy>=2.1.0", "pytest>=9.0.3", "pytest-cov>=7.1.0", "ruff>=0.15.14"]

[tool.ruff]
line-length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "semver"
version_provider = "uv"
update_changelog_on_bump = true
major_version_zero = true
